body:
  text: 卷一白鼻騧少年多好事攬轡向西都相逢狹斜路駐馬詣當壚樂府詩集二十五詩紀百九結襪子誰能訪故劍會自逐前魚裁紈終委篋織素空有餘樂府詩集七十四詩紀百九安定侯曲封疆在上地鍾鼓自相和美人當窗舞妖姬掩扇歌樂府詩集七十四詩紀百九燉煌樂客從遠方來相隨歌且笑自有燉煌樂不減安陵調樂府詩集七十八詩紀百九涼州樂歌二首遠遊武威郡遙望姑臧城車馬相交錯歌吹日縱橫初學記八詩紀百九路出玉門關城接龍城坂但事絃歌樂誰道山川遠同上搗衣長安城中秋夜長佳人錦石搗流黃香杵紋砧知近遠傳聲遞響何淒涼七夕長河爛中秋明月光蠮螉塞邊絶候鴈鴛鴦樓上望天狼詩紀百九從駕幸金墉城茲城實佳麗飛甍自相竝膠葛擁行風岧嶢閟流景御溝屬清洛馳道通丹屏湛淡水成文參差樹交影長門久已閉離宮一何靜細草緣玉階高枝蔭桐井微微夕渚暗肅肅暮風冷神行揚翠旗天臨肅清警伊臣從下列逢恩信多幸康衢雖已泰弱力將安騁初學記二十四詩紀百九春日臨池光風動春樹丹霞起暮陰嵯峨映連璧飄颻下散金徒自臨濠渚空復撫鳴琴莫知流水曲誰辨遊魚心類聚九文苑英華百六十五詩紀百九詠花蝶素蝶向林飛紅花逐風散花蝶俱不息紅素還相亂芬芬共襲手葳蕤從可玩不慰行客心遽動離居歎文苑英華三百二十九詩紀百九相國清河王挽歌高門詎改轍曲沼尚餘波何言吹樓下翻成薤露歌初學記十四詩紀百九
